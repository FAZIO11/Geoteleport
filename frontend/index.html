<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Location Spoofer</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #1a1f2c;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-press: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #d97706;
      --shadow: 0 6px 24px rgba(15,23,42,.08);
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      gap: 16px;
      z-index: 10;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -.01em;
      white-space: nowrap;
    }

    .title .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(37,99,235,.15);
      flex-shrink: 0;
    }

    /* status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: #f1f5f9;
      font-size: 13px;
      color: var(--muted);
      max-width: 55%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .status-pill .dot2 {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-pill.ready   { color: var(--good); background: #ecfdf5; }
    .status-pill.ready   .dot2 { background: var(--good); box-shadow: 0 0 0 3px rgba(22,163,74,.2); }
    .status-pill.warn    { color: var(--warn); background: #fffbeb; }
    .status-pill.warn    .dot2 { background: var(--warn); }
    .status-pill.bad     { color: var(--bad);  background: #fef2f2; }
    .status-pill.bad     .dot2 { background: var(--bad); }

    /* ── Layout ──────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 0;
    }

    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); max-height: 55vh; }
    }

    .sidebar {
      padding: 16px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    /* ── Setup checklist ─────────────────────────────────────────── */
    .setup-card {
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
    }
    .setup-card.needs-action { border-color: var(--warn); }
    .setup-card.all-good     { border-color: #86efac; }

    .setup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      cursor: pointer;
      user-select: none;
    }
    .setup-header .chevron {
      font-size: 10px;
      transition: transform .2s;
    }
    .setup-card.collapsed .chevron { transform: rotate(-90deg); }
    .setup-card.collapsed .setup-body { display: none; }

    .setup-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }

    .step-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .step-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-icon.done    { background: #dcfce7; color: var(--good); }
    .step-icon.pending { background: #fef9c3; color: var(--warn); }
    .step-icon.waiting { background: #f1f5f9; color: var(--muted); }

    .step-text { flex: 1; }
    .step-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
    }
    .step-label.muted { color: var(--muted); }
    .step-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }
    .step-hint code {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
    }

    .copy-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      cursor: pointer;
      margin-top: 5px;
      transition: background .12s;
    }
    .copy-btn:hover { background: #f1f5f9; }
    .copy-btn.copied { color: var(--good); border-color: #86efac; background: #f0fdf4; }

    /* ── Coord card & controls ───────────────────────────────────── */
    .group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    .search-row { display: flex; gap: 8px; }

    input[type="text"] {
      width: 100%;
      padding: 11px 13px;
      font-size: 15px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
      min-width: 0;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    button {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: 0;
      border-radius: var(--radius);
      padding: 11px 14px;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button:active  { transform: translateY(1px); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent); color: white;
      width: 100%; padding: 14px; font-size: 16px;
      box-shadow: var(--shadow);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-press); }

    .btn-secondary {
      background: #f1f5f9; color: var(--ink); width: 100%;
    }
    .btn-secondary:hover:not(:disabled) { background: #e2e8f0; }

    .btn-search {
      background: var(--ink); color: white; padding: 11px 14px; flex-shrink: 0;
    }
    .btn-search:hover:not(:disabled) { background: #0b1220; }

    .coord-card {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 13px;
      font-size: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-variant-numeric: tabular-nums;
    }
    .coord-card .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
    .coord-card .v { font-weight: 600; }

    .help {
      font-size: 13px; color: var(--muted); line-height: 1.45;
    }

    /* ── Active-spoof banner ─────────────────────────────────────── */
    .active-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--good);
      font-weight: 600;
    }
    .active-banner .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--good);
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(22,163,74,.5); }
      50%      { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
    }
    .active-banner.show { display: flex; }

    /* ── Search input wrapper + spinner ─────────────────────────── */
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .search-wrap input[type="text"] {
      width: 100%;
      padding-right: 32px; /* room for spinner */
    }
    .search-spinner {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }
    .search-wrap.loading .search-spinner { opacity: 1; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Search results ──────────────────────────────────────────── */
    .search-results {
      list-style: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-height: 220px;
      overflow-y: auto;
      background: white;
      display: none;
      margin-top: 5px;
      box-shadow: var(--shadow);
    }
    .search-results.open { display: block; }
    .search-results li {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      line-height: 1.35;
    }
    .search-results li:last-child { border-bottom: 0; }
    .search-results li:hover,
    .search-results li.focused { background: #eff6ff; color: var(--accent); }
    .search-results li.info {
      color: var(--muted); cursor: default; font-style: italic;
    }
    .search-results li.info:hover { background: transparent; color: var(--muted); }

    /* ── Map ─────────────────────────────────────────────────────── */
    #map { width: 100%; height: 100%; min-height: 0; }

    /* ── Toast ───────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      left: 50%; bottom: 24px;
      transform: translate(-50%, 20px);
      background: var(--ink); color: white;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow);
      max-width: min(560px, 90vw);
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 1000; text-align: center; line-height: 1.4;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.good { background: var(--good); }
    .toast.bad  { background: var(--bad); }
    .toast.warn { background: var(--warn); }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider { border: 0; border-top: 1px solid var(--line); margin: 0; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <span class="dot"></span>
      Location Spoofer
    </div>
    <div id="status-pill" class="status-pill">
      <span class="dot2"></span>
      <span id="status-text">Checking…</span>
    </div>
  </header>

  <main>
    <aside class="sidebar">

      <!-- Setup checklist -->
      <div class="setup-card" id="setup-card">
        <div class="setup-header" id="setup-toggle">
          <span>Device Setup</span>
          <span class="chevron">▼</span>
        </div>
        <div class="setup-body" id="setup-body">
          <!-- filled by JS -->
        </div>
      </div>

      <hr class="divider" />

      <!-- Active spoof indicator -->
      <div class="active-banner" id="active-banner">
        <span class="pulse"></span>
        <span id="active-text">Location active</span>
      </div>

      <!-- Search -->
      <div class="group">
        <label for="search">Search a place</label>
        <div class="search-row">
          <div class="search-wrap" id="search-wrap">
            <input id="search" type="text" placeholder="e.g. Eiffel Tower, Paris" autocomplete="off" />
            <div class="search-spinner"></div>
          </div>
          <button id="search-btn" class="btn-search" type="button">Go</button>
        </div>
        <ul id="search-results" class="search-results"></ul>
      </div>

      <!-- Picked coords -->
      <div class="group">
        <label>Picked location</label>
        <div class="coord-card">
          <div class="k">Lat</div><div class="v" id="lat-value">—</div>
          <div class="k">Lng</div><div class="v" id="lng-value">—</div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="group">
        <button id="spoof-btn" class="btn-primary" type="button" disabled>
          Move iPhone Here
        </button>
      </div>
      <div class="group">
        <button id="reset-btn" class="btn-secondary" type="button" disabled>
          Stop Spoofing — Restore Real GPS
        </button>
      </div>

      <p class="help">
        Click the map or drag the pin to pick a spot, then tap
        <strong>Move iPhone Here</strong>. Open <strong>Maps</strong> on your
        iPhone to confirm — force-quit and reopen Maps if the dot doesn't jump.
      </p>

    </aside>

    <div id="map"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
(function () {
  "use strict";

  // ── Config ────────────────────────────────────────────────────────────
  const API_BASE =
    (location.protocol === "http:" || location.protocol === "https:")
      ? ""
      : "http://localhost:8765";

  const DEFAULT_CENTER = [40.7484, -73.9857];
  const DEFAULT_ZOOM   = 13;

  // ── DOM refs ──────────────────────────────────────────────────────────
  const $     = id => document.getElementById(id);
  const pill  = $("status-pill");
  const pillText = $("status-text");
  const spoofBtn  = $("spoof-btn");
  const resetBtn  = $("reset-btn");
  const latVal    = $("lat-value");
  const lngVal    = $("lng-value");
  const searchInput  = $("search");
  const searchBtn    = $("search-btn");
  const resultsEl    = $("search-results");
  const toastEl      = $("toast");
  const setupCard    = $("setup-card");
  const setupBody    = $("setup-body");
  const setupToggle  = $("setup-toggle");
  const activeBanner = $("active-banner");
  const activeText   = $("active-text");

  // ── Map setup ─────────────────────────────────────────────────────────
  const map = L.map("map", { zoomControl: true, attributionControl: true })
    .setView(DEFAULT_CENTER, DEFAULT_ZOOM);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap contributors",
  }).addTo(map);

  const marker = L.marker(DEFAULT_CENTER, { draggable: true }).addTo(map);
  let picked = { lat: DEFAULT_CENTER[0], lng: DEFAULT_CENTER[1] };
  setPicked(picked.lat, picked.lng);

  map.on("click", e => setPicked(e.latlng.lat, e.latlng.lng, true));
  marker.on("dragend", () => {
    const p = marker.getLatLng();
    setPicked(p.lat, p.lng, false);
  });

  function setPicked(lat, lng, moveMarker = true) {
    picked = { lat, lng };
    latVal.textContent = lat.toFixed(5);
    lngVal.textContent = lng.toFixed(5);
    if (moveMarker) marker.setLatLng([lat, lng]);
  }

  // ── Toast ─────────────────────────────────────────────────────────────
  let toastTimer = null;
  function toast(msg, kind) {
    toastEl.textContent = msg;
    toastEl.className = "toast show" + (kind ? " " + kind : "");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 5000);
  }

  // ── Setup checklist ───────────────────────────────────────────────────
  let setupCollapsed = false;

  setupToggle.addEventListener("click", () => {
    setupCollapsed = !setupCollapsed;
    setupCard.classList.toggle("collapsed", setupCollapsed);
  });

  function stepIcon(state) {
    if (state === "done")    return { cls: "done",    icon: "✓" };
    if (state === "pending") return { cls: "pending",  icon: "!" };
    return                          { cls: "waiting", icon: "·" };
  }

  function makeStep(state, label, hint, copyText) {
    const ic = stepIcon(state);
    const row = document.createElement("div");
    row.className = "step-row";
    row.innerHTML = `
      <div class="step-icon ${ic.cls}">${ic.icon}</div>
      <div class="step-text">
        <div class="step-label${state === "waiting" ? " muted" : ""}">${label}</div>
        ${hint ? `<div class="step-hint">${hint}</div>` : ""}
        ${copyText ? `<button class="copy-btn" data-copy="${copyText}">Copy command</button>` : ""}
      </div>`;
    return row;
  }

  function renderSetup(data) {
    setupBody.innerHTML = "";
    setupCard.classList.remove("needs-action", "all-good");

    const step = data.step || "no_device";
    const ios  = data.ios_version ? parseInt(data.ios_version) : 0;
    const ready = step === "ready";

    // ── Step 1: Connect ──────────────────────────────────────────────
    const s1 = step === "no_device" ? "pending" : "done";
    setupBody.appendChild(makeStep(
      s1,
      "Connect iPhone via USB",
      s1 === "pending"
        ? "Use a data cable (charge-only cables won't work). Your Mac may ask to allow accessory — click Allow."
        : null
    ));

    // ── Step 2: Trust ────────────────────────────────────────────────
    const s2 = ["no_device"].includes(step) ? "waiting"
             : ["locked", "untrusted"].includes(step) ? "pending"
             : "done";
    const trustHint = step === "locked"    ? "Unlock your iPhone first, then tap <strong>Trust</strong> on the popup."
                    : step === "untrusted" ? "Unplug, replug, and tap <strong>Trust This Computer</strong> on your iPhone."
                    : null;
    setupBody.appendChild(makeStep(s2, "Trust this computer on iPhone", trustHint));

    // ── Step 3: Developer Mode ───────────────────────────────────────
    const s3 = step === "no_developer_mode" ? "pending"
             : ["no_device","locked","untrusted"].includes(step) ? "waiting"
             : "done";
    const devHint = step === "no_developer_mode"
      ? "<strong>Settings → Privacy &amp; Security → Developer Mode → ON</strong>. Your iPhone will reboot — unlock it and tap Turn On."
      : (s3 === "waiting" ? "Complete the steps above first." : null);
    setupBody.appendChild(makeStep(s3, "Enable Developer Mode (iPhone)", devHint));

    // ── Step 4: Tunnel (iOS 17+) ─────────────────────────────────────
    if (ios >= 17 || step === "no_tunnel") {
      const s4 = step === "no_tunnel" ? "pending"
               : (ready || step === "no_device") && data.tunnel_running ? "done"
               : ready ? "done"
               : ["no_device","locked","untrusted","no_developer_mode"].includes(step) ? "waiting"
               : "done";
      const tunnelHint = step === "no_tunnel"
        ? `Open <strong>Terminal</strong> and run — leave that window open while you spoof:`
        : (s4 === "waiting" ? "Complete the steps above first." : null);
      setupBody.appendChild(makeStep(
        s4,
        "Start the developer tunnel (iOS 17+)",
        tunnelHint,
        step === "no_tunnel" ? "./backend/start-tunnel.sh" : null
      ));
    }

    // ── Card styling ─────────────────────────────────────────────────
    if (ready) {
      setupCard.classList.add("all-good");
      // Auto-collapse when ready (once), so map controls get focus
      if (!setupCollapsed) {
        setupCollapsed = true;
        setupCard.classList.add("collapsed");
      }
    } else {
      setupCard.classList.add("needs-action");
      setupCollapsed = false;
      setupCard.classList.remove("collapsed");
    }

    // Wire up copy buttons
    setupBody.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(btn.dataset.copy).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => { btn.textContent = "Copy command"; btn.classList.remove("copied"); }, 2000);
        });
      });
    });
  }

  // ── Status polling ────────────────────────────────────────────────────
  let lastStep = null;
  let pollTimer = null;

  async function pollStatus() {
    try {
      const r = await fetch(API_BASE + "/status", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      applyStatus(data);
    } catch {
      applyStatus({ step: "no_device", message: "Can't reach the local server. Is the app running?" });
    }
    const interval = lastStep === "ready" ? 5000 : 1200;
    pollTimer = setTimeout(pollStatus, interval);
  }

  function applyStatus(data) {
    const step  = data.step || "no_device";
    const ready = step === "ready";

    // Pill
    pill.className = "status-pill " + (ready ? "ready" : step === "no_device" ? "bad" : "warn");
    pillText.textContent = data.message || (ready ? "Ready" : "Setup needed");

    // Buttons — only enable when ready
    spoofBtn.disabled = !ready;
    resetBtn.disabled = !ready;

    // Checklist
    renderSetup(data);

    lastStep = step;
  }

  pollStatus();

  // ── Spoof & reset ─────────────────────────────────────────────────────
  let spoofActive = false;

  async function postJSON(path, body, timeoutMs = 35000) {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const r = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
        signal: ctrl.signal,
      });
      let data;
      try { data = await r.json(); } catch { data = { ok: false, message: "Unexpected server response." }; }
      return { httpOk: r.ok, ...data };
    } catch (e) {
      if (e?.name === "AbortError") {
        return { httpOk: false, ok: false, message: "iPhone didn't respond in time. Check the tunnel terminal and try again." };
      }
      throw e;
    } finally {
      clearTimeout(timer);
    }
  }

  function setActiveBanner(on, coords) {
    spoofActive = on;
    activeBanner.classList.toggle("show", on);
    if (on && coords) {
      activeText.textContent = `Spoofing: ${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
    }
  }

  spoofBtn.addEventListener("click", async () => {
    spoofBtn.disabled = true;
    const orig = spoofBtn.textContent;
    spoofBtn.textContent = "Sending to iPhone…";
    try {
      const result = await postJSON("/spoof", { lat: picked.lat, lng: picked.lng });
      if (result.ok) {
        toast("Location set! Open Maps on your iPhone to confirm.", "good");
        setActiveBanner(true, picked);
      } else {
        toast(result.message || "Something went wrong.", "bad");
        setActiveBanner(false);
      }
    } catch {
      toast("Couldn't reach the local server.", "bad");
    } finally {
      spoofBtn.textContent = orig;
      spoofBtn.disabled = (lastStep !== "ready");
    }
  });

  resetBtn.addEventListener("click", async () => {
    resetBtn.disabled = true;
    const orig = resetBtn.textContent;
    resetBtn.textContent = "Resetting…";
    try {
      const result = await postJSON("/reset");
      toast(result.message || (result.ok ? "GPS restored." : "Couldn't reset."), result.ok ? "good" : "bad");
      if (result.ok) setActiveBanner(false);
    } catch {
      toast("Couldn't reach the local server.", "bad");
    } finally {
      resetBtn.textContent = orig;
      resetBtn.disabled = (lastStep !== "ready");
    }
  });

  // ── Geocoding ─────────────────────────────────────────────────────────
  const searchWrap = $("search-wrap");
  let searchAbort  = null;
  let debounceTimer = null;
  let focusedIdx   = -1;
  const DEBOUNCE_MS = 300;
  const MIN_CHARS   = 2;

  function setSearchLoading(on) {
    searchWrap.classList.toggle("loading", on);
  }

  function infoItem(text) {
    const li = document.createElement("li");
    li.textContent = text;
    li.className = "info";
    return li;
  }

  async function runSearch({ autocomplete = false } = {}) {
    const q = searchInput.value.trim();
    if (q.length < MIN_CHARS) {
      resultsEl.classList.remove("open");
      resultsEl.innerHTML = "";
      return;
    }

    if (searchAbort) searchAbort.abort();
    searchAbort = new AbortController();
    focusedIdx = -1;

    // Show inline loading state immediately
    resultsEl.innerHTML = "";
    resultsEl.appendChild(infoItem("Searching…"));
    resultsEl.classList.add("open");
    setSearchLoading(true);
    if (!autocomplete) searchBtn.disabled = true;

    try {
      const r = await fetch(
        "https://nominatim.openstreetmap.org/search?format=json&limit=6&q=" + encodeURIComponent(q),
        { signal: searchAbort.signal, headers: { Accept: "application/json" } }
      );
      if (!r.ok) throw new Error("HTTP " + r.status);
      renderResults(await r.json());
    } catch (e) {
      if (e.name === "AbortError") return; // superseded by newer keystroke
      resultsEl.innerHTML = "";
      resultsEl.appendChild(infoItem("Search failed — check your internet connection."));
    } finally {
      setSearchLoading(false);
      if (!autocomplete) searchBtn.disabled = false;
    }
  }

  function selectableItems() {
    return [...resultsEl.querySelectorAll("li:not(.info)")];
  }

  function setFocused(idx) {
    const items = selectableItems();
    items.forEach((li, i) => li.classList.toggle("focused", i === idx));
    focusedIdx = idx;
  }

  function renderResults(items) {
    resultsEl.innerHTML = "";
    focusedIdx = -1;
    if (!items?.length) {
      resultsEl.appendChild(infoItem("No results found."));
    } else {
      for (const it of items) {
        const li = document.createElement("li");
        li.textContent = it.display_name;
        // mousedown fires before blur so the dropdown doesn't vanish first
        li.addEventListener("mousedown", e => { e.preventDefault(); selectResult(it); });
        resultsEl.appendChild(li);
      }
    }
    resultsEl.classList.add("open");
  }

  function selectResult(it) {
    const lat = parseFloat(it.lat), lng = parseFloat(it.lon);
    if (!isFinite(lat) || !isFinite(lng)) return;
    map.setView([lat, lng], 15);
    setPicked(lat, lng);
    resultsEl.classList.remove("open");
    searchInput.value = "";
    focusedIdx = -1;
  }

  // Live autocomplete — debounced so we don't hammer Nominatim on every keystroke
  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    const q = searchInput.value.trim();
    if (q.length < MIN_CHARS) {
      resultsEl.classList.remove("open");
      resultsEl.innerHTML = "";
      return;
    }
    debounceTimer = setTimeout(() => runSearch({ autocomplete: true }), DEBOUNCE_MS);
  });

  // Keyboard navigation: arrows move focus, Enter selects or searches, Escape closes
  searchInput.addEventListener("keydown", e => {
    const items = selectableItems();
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setFocused(Math.min(focusedIdx + 1, items.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setFocused(Math.max(focusedIdx - 1, 0));
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (focusedIdx >= 0 && items[focusedIdx]) {
        items[focusedIdx].dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
      } else {
        clearTimeout(debounceTimer);
        runSearch();
      }
    } else if (e.key === "Escape") {
      resultsEl.classList.remove("open");
      focusedIdx = -1;
    }
  });

  searchBtn.addEventListener("click", () => {
    clearTimeout(debounceTimer);
    runSearch();
  });

  document.addEventListener("click", e => {
    if (!searchWrap.contains(e.target) && e.target !== searchBtn && !resultsEl.contains(e.target))
      resultsEl.classList.remove("open");
  });

  // ── Misc ──────────────────────────────────────────────────────────────
  setTimeout(() => map.invalidateSize(), 100);
  window.addEventListener("resize", () => map.invalidateSize());
})();
</script>
</body>
</html>
